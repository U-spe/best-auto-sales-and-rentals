<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vehicles for Sale | Best Auto Sales & Rentals</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/listings.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="global-header"></div>

    <main class="listings-page-wrapper">
        
        <section class="inventory-hero">
            <div class="hero-bg">
                <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=80&w=1920" alt="Luxury car showroom" class="parallax-img">
            </div>
            <div class="hero-overlay-dark"></div>
            <div class="container hero-text-container reveal-on-scroll">
                <span class="gold-subtitle">Purchase Options</span>
                <h1 class="massive-title">VEHICLES FOR SALE</h1>
                <p class="hero-desc">Browse our certified premium inventory available for immediate purchase.</p>
            </div>
        </section>

        <section class="inventory-section">
            <div class="container">
                <div class="text-center-forced" style="margin-bottom: 50px;">
                    <span class="gold-subtitle">Own The Road</span>
                    <h2 style="color: white; font-size: 2.5rem; font-weight: 900;">Available to Buy</h2>
                </div>
                
                <div class="grid-container" id="buy-grid"></div>
                
                <div class="load-more-container">
                    <button id="load-more-buy" class="btn-load-more">Load More Vehicles</button>
                </div>
            </div>
        </section>

    </main>

    <div id="global-footer"></div>

    <script src="js/he-fo.js"></script>
    <script src="js/buy.js"></script>
</body>
</html>
