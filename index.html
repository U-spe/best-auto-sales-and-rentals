    function tTokyo() {
      var GMT = 9; //GMT for Japan
      var str;
      var week = new Array("Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday");
      var month = new Array("Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec");
      var gmt = new Date();
      var now = new Date();
      var set = now.getTimezoneOffset();
      gmt.setTime(now.getTime() + (set / 60 + parseFloat(GMT)) * 60 * 60 * 1000); /// Calculate with GMT
      Mon = month[gmt.getMonth()];
      Wee = week[gmt.getDay()];
      Dat = gmt.getDate(); if (Dat < 10) Dat = "0" + Dat;
      //Yr  = gmt.getYear();
      hor = gmt.getHours(); if (hor < 10) hor = "0" + hor;
      if (hor <= 12) {
        str = "AM";
      }
      else {
        hor = hor - 12;
        hor = /*"0" +*/ hor;
        str = "PM";
      }
      min = gmt.getMinutes(); if (min < 10) min = "0" + min;
      sec = gmt.getSeconds(); if (sec < 10) sec = "0" + sec;

      document.getElementById("timestr").innerHTML = hor + ":" + min + " " + str + ", " + Wee//+", "+Wee//+", "+Dat+"-"+Mon;//+"-"+Yr;
      setTimeout('tTokyo()', 999);
    }
    tTokyo();

    //  guyana time =======================
    function tGuyana() {
      var GMT = -4; // GMT for Guyana
      var str;
      var week = new Array("Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday");

      var gmt = new Date();
      var now = new Date();
      var set = now.getTimezoneOffset();

      gmt.setTime(now.getTime() + (set / 60 + parseFloat(GMT)) * 60 * 60 * 1000);

      var Wee = week[gmt.getDay()];

      var hor = gmt.getHours();
      if (hor < 10) hor = "0" + hor;

      if (hor < 12) {
        str = "AM";
      } else {
        if (hor > 12) hor = hor - 12;
        str = "PM";
      }

      var min = gmt.getMinutes();
      if (min < 10) min = "0" + min;

      document.getElementById("guyanaTime").innerHTML =
        hor + ":" + min + " " + str + ", " + Wee;

      setTimeout(tGuyana, 999);
    }
    tGuyana();

  document.addEventListener("DOMContentLoaded", function () {
    const observer = new MutationObserver(function () {
        const swiperEl = document.querySelector('.testimonial-swiper');
        if (!swiperEl) return;
        // Stop observing once found
        observer.disconnect();
        new Swiper('.testimonial-swiper', {
        loop: true,
        slidesPerView: 2,
        spaceBetween: 30,
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next-custom',
            prevEl: '.swiper-button-prev-custom',
        },
        autoplay: {
            delay: 3000,
            disableOnInteraction: false,
        },
        breakpoints: {
            0: { slidesPerView: 1 },
            768: { slidesPerView: 1 },
        },
        });

    });
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
    });




   document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {

    const cards = document.querySelectorAll(".service-card");
    const defaultActive = document.querySelector(".service-card.active");
    const grid = document.querySelector(".services-grid");

    const updateIconColors = () => {
      cards.forEach(card => {
        const icon = card.querySelector(".icon-wrap");
        if (card.classList.contains("active")) {
          icon.style.background = "var(--bs-sitePrimary-color)";
        } else {
          icon.style.background = "var(--bs-siteSecondary-color)";
        }
      });
    };

    // Initial setup
    updateIconColors();

    cards.forEach(card => {
      card.addEventListener("mouseenter", () => {
        cards.forEach(c => c.classList.remove("active"));
        card.classList.add("active");
        updateIconColors();
      });
    });

    grid.addEventListener("mouseleave", () => {
      cards.forEach(c => c.classList.remove("active"));
      if (defaultActive) defaultActive.classList.add("active");
      updateIconColors();
    });

  }, 5000); // ⏱️ 3 seconds delay
});

</script>

<script type="text/javascript">
  function loadDropdownData(id, helperMethodName, placeholder = '', dataById = '', selectReqValue = '') {
			return new Promise((resolve, reject) => {
				$.ajaxSetup({
					headers: {
						'X-CSRF-TOKEN': $('meta[name="csrf-token"]').attr('content')
					}
				});

				$.ajax({
					type: "GET",
					url: "https://www.caricomautosales.gy/auction/get-data-load",
					data: { id: id, methodName: helperMethodName, dataById: dataById },
					beforeSend: function () {
						$('#' + id).html('<option>Loading...</option>'); // Show loading text
					},
					success: function (response) {
						if (Array.isArray(response) && response.length > 0) {
							dropdownWithSelectedData(id, response, selectReqValue, placeholder,helperMethodName);
							resolve();  // Resolve the promise when the dropdown is successfully loaded
						} else {
							console.warn('No data found for:', id);
							$('#' + id).html('<option value="">No Data Found</option>');
							resolve();  // Still resolve to allow chaining
						}
					},
					error: function (error) {
						console.error("Error fetching data:", error);
						$('#' + id).html('<option value="">Error Loading Data</option>');
						reject(error);  // Reject the promise if there's an error
					}
				});
			});
		}

    function dropdownWithSelectedData(id, data, selectedValue = null, placeholder = null,helperMethodName=null) {
			if (Array.isArray(data) && data.length > 0) {
				const options = data.map(item => 
					`<option value="${item.value}" ${(item.value == selectedValue) ? 'selected' : ''}>${(helperMethodName!='modelCodeOneData') ? item.name.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase()+word.slice(1)).join(' ') : item.name}</option>`
				).join('');
				const placeholderText = placeholder ? `Select an ${placeholder}` : 'Select an Option';
				$('#' + id).html(`<option value="">${placeholderText}</option>` + options);
			} else {
				console.warn(`No data available for dropdown ${id}`, data);
				$('#' + id).html('<option value="">No Data Found</option>');
			}
		}
        

  function checkForm(theform) {
    var year_from = '';
    var year_to = '';

    jQuery(document).ready(function($) {
      year_from = $('#mfg_from').val();
      year_to = $('#mfg_to').val();
    });

    if (year_from != '' && year_to != '') {
      if (eval(year_from) > eval(year_to)) {
        alert("Invalid Year Range !");
        $('#mfg_from').focus();
        return false;
      }
    }

    var len = theform.elements.length;
    for (var i = 0; i < len; i++) {
      var e = theform.elements[i];
      if ((e.type == 'checkbox' || e.type == 'radio') && !e.checked) e.disabled = true;
      if ((e.type == 'select-one') && e.value == '') e.disabled = true;
      if (e.type == 'text' && e.value.length == 0) e.disabled = true;

    }
    return true;
  }

     async function getCsrfToken() {
        try {
            const res = await fetch('https://www.caricomautosales.gy/get-csrf-token', {
                credentials: 'same-origin'
            });
            const data = await res.json();
            return data.token || '';
        } catch (error) {
            console.error('Error fetching CSRF token:', error);
            return '';
        }
    }
     // model data reloading function
    // function loadModalData(make_val, model_id, selected_value = '') {
    async function loadModalData(make_val, model_id, selected_value = '') {
        const csrfToken = await getCsrfToken();
        $.ajax({
            url: "https://www.caricomautosales.gy/get-model-data",
            type: 'POST',
            data: {
                _token: csrfToken,
                value: make_val,
                filter: selected_value
            },
            dataType: 'JSON',
            beforeSend: function () {
                $('#' + model_id).html('<option value="">Loading...</option>');
            },
            success: function(respJSON) {
                $('#' + model_id).html('<option value="">Select Model</option>');

                if (respJSON.data && Array.isArray(respJSON.data) && respJSON.data.length > 0) {
                    $.each(respJSON.data, function(index, item) {
                        if (item.name && item.value) {
                            var isSelected = (selected_value && selected_value == item.value) ? 'selected' : '';
                            $('#' + model_id).append('<option value="' + item.value + '" ' + isSelected + '>' + item.name + '</option>');
                        }
                    });
                } 
            },
            error: function(xhr, status, error) {
                console.error("AJAX Error: " + status + ", " + error);
            }
        });
    }
</script>
