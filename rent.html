<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vehicles for Rent | Best Auto Sales & Rentals</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/listings.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="global-header"></div>

    <main class="listings-page-wrapper">
        
        <section class="inventory-hero">
            <div class="hero-bg">
                <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&q=80&w=1920" alt="Luxury car driving" class="parallax-img">
            </div>
            <div class="hero-overlay-dark"></div>
            <div class="container hero-text-container reveal-on-scroll">
                <span class="gold-subtitle">Flexible Leasing</span>
                <h1 class="massive-title">VEHICLES FOR RENT</h1>
                <p class="hero-desc">Explore our top-tier rental fleet tailored for short and long-term needs.</p>
            </div>
        </section>

        <section class="inventory-section">
            <div class="container">
                <div class="text-center-forced" style="margin-bottom: 50px;">
                    <span class="gold-subtitle">Drive On Demand</span>
                    <h2 style="color: white; font-size: 2.5rem; font-weight: 900;">Available to Rent</h2>
                </div>
                
                <div class="grid-container" id="rent-grid"></div>
                
                <div class="load-more-container">
                    <button id="load-more-rent" class="btn-load-more">Load More Vehicles</button>
                </div>
            </div>
        </section>

    </main>

    <div id="global-footer"></div>

    <script src="js/he-fo.js"></script>
    <script src="js/rent.js"></script>
</body>
</html>
